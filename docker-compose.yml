version: "3"
services:
  db:
    platform: linux/x86_64
    image: mariadb:12
    container_name: goone.db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: goone
      MYSQL_USER: goone
      MYSQL_PASSWORD: goone123
      MYSQL_ROOT_PASSWORD: goone123
      TZ: UTC
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db-data:
